<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>END · Final RESPO Output</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#f00; text-align:center; }
#geo {
    width: 360px; height: 360px;
    margin: 40px auto;
    border: 3px solid #f00;
    border-radius: 50%;
    position: relative;
    animation: spin 10s linear infinite;
}
.dot {
    width: 12px; height: 12px;
    background:#f00; border-radius:50%;
    position:absolute;
}
pre {
    background:#111; padding:20px; border-left:3px solid #f00;
}
@keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
</style>

<script src="END.core.js"></script>
<script src="END.pipeline.js"></script>

</head>

<body>

<h1>END · Final RESPO Output</h1>

<div id="geo"></div>
<pre id="status">Lade END…</pre>

<script>
const geo = document.getElementById("geo");
const count = 81;
const radius = 160;

for(let i=0; i<count; i++){
    const dot = document.createElement("div");
    dot.className = "dot";

    const angle = (i / count) * Math.PI * 2;
    const x = Math.cos(angle) * radius + 180 - 6;
    const y = Math.sin(angle) * radius + 180 - 6;

    dot.style.left = x + "px";
    dot.style.top = y + "px";

    geo.appendChild(dot);
}

// Dummy Inputs (werden später ersetzt)
const un = { unity: 12, stabil: 9, gamma: 3 };
const mvmr = { vector: 33, matrix: [4,4], route: 55 };
const whirl = { index: 22 };
const octa = { field: 7 };
const real = { route: 55 };

const result = END_PIPE.fuse(un, mvmr, whirl, octa, real);

document.getElementById("status").innerText =
    JSON.stringify(result, null, 2);
</script>

</body>
</html>
